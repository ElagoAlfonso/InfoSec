<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <section>
    <div class="login-box">
      <form id="registerForm" method="POST" action="../auth/register.php">
        <h2>Register</h2>
        <p id="response-message" style="color: white; text-align: center; font-size: 1.1em;"></p>

        <div class="input-box">
          <input type="text" id="username" name="username" required>
          <label>Username</label>
        </div>
        <div class="input-box">
          <input type="email" id="email" name="email" required>
          <label>Email</label>
        </div>
        <div class="input-box">
          <input type="password" id="password" name="password" required oninput="checkStrength()">
          <label>Password</label>
          <span id="togglePassword" style="cursor:pointer; position:absolute; right:10px; top:50%; transform:translateY(-50%);">👁</span>
        </div>
        <p id="strength-message" style="color: white; font-size: 0.9em;"></p>
        <div class="input-box">
          <input type="password" id="confirmPassword" required>
          <label>Confirm Password</label>
          <span id="toggleConfirmPassword" style="cursor:pointer; position:absolute; right:10px; top:50%; transform:translateY(-50%);">👁</span>
        </div>

        <button type="submit">Create Account</button>
        <div class="register-link">
          <p>Already have an account? <a href="../public/login.html">Login</a></p>
        </div>
      </form>
    </div>
  </section>

  <script src="../assets/js/register.js"></script>
</body>
</html>
