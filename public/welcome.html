<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <section>
    <div class="welcome-box">
      <h1>Welcome to CyberSecurity</h1>
      <p id="userEmail"></p>
      <button id="logoutBtn">Logout</button>
    </div>
  </section>
  
  <script>
  // Check the browser's storage to see if we saved a user earlier
  const userJSON = localStorage.getItem("loggedInUser");
  // If there's nothing in storage, they aren't logged in, so kick them out
  if (!userJSON) {
    window.location.href = "../public/login.html";
  } else {
    // Turn the string back into an object so we can use it
    const user = JSON.parse(userJSON);
    // Put the name and email on the screen
    document.getElementById("userEmail").textContent =
      `Logged in as: ${user.username} (${user.email})`;
  }

  // When they click logout, just wipe the storage and go back to login
  document.getElementById("logoutBtn").addEventListener("click", function () {
    localStorage.removeItem("loggedInUser");
    window.location.href = "../public/login.html";
  });
</script>
</body>
</html>
